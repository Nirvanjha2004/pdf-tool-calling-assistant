<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Q&A Assistant</title>

<!-- MathJax — renders LaTeX math from the LLM response -->
<script>
  window.MathJax = {
    tex: {
      inlineMath:  [['\\(', '\\)'], ['$', '$']],
      displayMath: [['\\[', '\\]'], ['$$', '$$']],
      processEscapes: true,
    },
    options: {
      skipHtmlTags: ['script','noscript','style','textarea','pre','code'],
    },
    startup: { typeset: false },   // we call MathJax.typesetPromise() manually
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
  /* ─── Reset & Variables ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #242838;
    --border: #2d3248;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --primary-glow: rgba(99,102,241,0.25);
    --success: #22c55e;
    --calc-tool: #f59e0b;
    --search-tool: #06b6d4;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* ─── Layout ─── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .doc-status {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }
  .status-dot.loaded { background: var(--success); box-shadow: 0 0 8px rgba(34,197,94,0.4); }

  /* ─── Upload Area ─── */
  .upload-area {
    flex-shrink: 0;
    margin: 12px 0;
    padding: 14px 20px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .upload-area:hover { border-color: var(--primary); background: var(--surface-2); }
  .upload-area.has-file {
    border-color: var(--success);
    border-style: solid;
    background: rgba(34,197,94,0.06);
  }
  .upload-area input[type="file"] { display: none; }
  .upload-area .file-name {
    color: var(--text);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 300px;
  }
  .upload-area .upload-icon { font-size: 20px; }
  .upload-progress {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
    display: none;
  }
  .upload-progress.active { display: block; }
  .upload-progress-bar {
    height: 100%;
    width: 0%;
    background: var(--primary);
    border-radius: 4px;
    transition: width 0.3s;
  }

  /* ─── Chat Messages ─── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }


  /* ─── Message Bubbles ─── */
  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.25s ease-out;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .msg.user .msg-avatar { background: var(--primary); }
  .msg.assistant .msg-avatar { background: var(--surface-2); border: 1px solid var(--border); }
  .msg-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble code {
    background: rgba(255,255,255,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,0.3);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
  }

  /* ─── Tool Badge ─── */
  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .tool-badge.calculator { background: rgba(245,158,11,0.15); color: var(--calc-tool); }
  .tool-badge.search { background: rgba(6,182,212,0.15); color: var(--search-tool); }
  .tool-badge.knowledge { background: rgba(99,102,241,0.15); color: var(--primary); }

  /* ─── Thinking Indicator ─── */
  .thinking {
    display: flex;
    gap: 10px;
    padding: 4px 0;
  }
  .thinking-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }
  .thinking-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── Input Area ─── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 0 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    font-family: var(--font);
    resize: none;
    outline: none;
    transition: border 0.2s;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
  }
  .input-area textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .input-area textarea::placeholder { color: var(--text-muted); }
  .input-area textarea:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    height: 48px;
  }
  .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-send { padding: 12px 16px; min-width: 48px; justify-content: center; }

  /* ─── Welcome State ─── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px 20px;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: var(--surface-2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border: 1px solid var(--border);
  }
  .welcome h2 { color: var(--text); font-size: 20px; }
  .welcome p { max-width: 400px; font-size: 14px; line-height: 1.6; }
  .welcome-suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .welcome-suggestions button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .welcome-suggestions button:hover {
    border-color: var(--primary);
    color: var(--text);
    background: var(--surface);
  }

  /* ─── Error Toast ─── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #ef4444;
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .app { padding: 0 12px; }
    .logo span { display: none; }
    .msg-bubble { max-width: 90%; }
    .upload-area { padding: 12px 16px; font-size: 13px; }
    .welcome-suggestions button { font-size: 12px; padding: 6px 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">📄</div>
      <span>PDF Q&A</span>
    </div>
    <div class="header-actions">
      <div class="doc-status" id="docStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">No document</span>
      </div>
    </div>
  </header>

  <!-- Upload Area -->
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">📤</span>
    <span id="uploadText">Drop a PDF here or click to upload</span>
    <span class="file-name" id="fileName"></span>
    <input type="file" id="fileInput" accept=".pdf" />
  </div>
  <div class="upload-progress" id="uploadProgress">
    <div class="upload-progress-bar" id="uploadProgressBar"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>PDF Q&A Assistant</h2>
      <p>Upload a PDF document, then ask questions about it. The AI automatically uses the right tool — calculator for math, document search for content questions.</p>
      <div class="welcome-suggestions">
        <button onclick="suggest('What is 15% of 2400?')">What is 15% of 2400?</button>
        <button onclick="suggest('Summarize this document')">Summarize this document</button>
        <button onclick="suggest('What skills are mentioned?')">What skills are mentioned?</button>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea id="questionInput" rows="1" placeholder="Ask a question about your document..." disabled></textarea>
    <button class="btn btn-send" id="sendBtn" disabled onclick="sendQuestion()">➤</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── State ───
  let history = [];
  let documentLoaded = false;
  let isProcessing = false;

  // ─── DOM refs ───
  const chatArea = document.getElementById('chatArea');
  const welcome = document.getElementById('welcome');
  const input = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');
  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const uploadText = document.getElementById('uploadText');
  const fileName = document.getElementById('fileName');
  const uploadProgress = document.getElementById('uploadProgress');
  const uploadProgressBar = document.getElementById('uploadProgressBar');
  const statusDot = document.getElementById('statusDot');
  const statusLabel = document.getElementById('statusLabel');
  const toast = document.getElementById('toast');

  // ─── Auto-resize textarea ───
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  // ─── File Upload ───
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) uploadFile(e.target.files[0]);
  });

  // Drag & drop
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = 'var(--primary)';
    uploadArea.style.background = 'var(--surface-2)';
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.style.borderColor = '';
    uploadArea.style.background = '';
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    uploadArea.style.background = '';
    if (e.dataTransfer.files.length > 0) uploadFile(e.dataTransfer.files[0]);
  });

  async function uploadFile(file) {
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      showToast('Please select a PDF file.');
      return;
    }

    // Reset UI
    uploadArea.classList.add('has-file');
    fileName.textContent = '📄 ' + file.name;
    uploadText.textContent = '';
    uploadProgress.classList.add('active');
    uploadProgressBar.style.width = '15%';
    documentLoaded = false;
    input.disabled = true;
    sendBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', file);

    let jobId;
    try {
      // Step 1 — POST /upload  (returns instantly with a job_id)
      const res = await fetch('/upload', { method: 'POST', body: formData });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Upload failed');
      }
      const data = await res.json();
      jobId = data.job_id;
      uploadProgressBar.style.width = '35%';
    } catch (err) {
      resetUploadUI();
      showToast(err.message || 'Upload failed');
      return;
    }

    // Step 2 — Poll GET /job/{id} until done
    const METHOD_LABELS = {
      pypdfium2:        '⚡ fast extract',
      pdfplumber:       '📄 text extract',
      'pypdfium2+ocr':  '⚡+🔍 text & OCR',
      rapidocr:         '🔍 OCR',
      none:             '',
    };

    let dots = 0;
    const pollInterval = setInterval(async () => {
      try {
        const r = await fetch(`/job/${jobId}`);
        const job = await r.json();

        // Animate progress bar while running
        if (job.status === 'pending' || job.status === 'running') {
          dots = (dots + 1) % 4;
          const label = job.status === 'running' && job.method === 'rapidocr'
            ? '🔍 Running OCR' + '.'.repeat(dots)
            : '⚙️ Processing' + '.'.repeat(dots);
          uploadText.textContent = label;
          // Keep progress bar animated between 35–85%
          const pct = 35 + Math.min(50, (Date.now() % 5000) / 100);
          uploadProgressBar.style.width = pct + '%';
          return;
        }

        clearInterval(pollInterval);

        if (job.status === 'error') {
          resetUploadUI();
          showToast(job.error || 'Processing failed');
          return;
        }

        if (job.status === 'done') {
          if (job.chunks_count === 0) {
            resetUploadUI();
            showToast('No text found in PDF — even after OCR. Try another file.');
            return;
          }

          // Success
          uploadProgressBar.style.width = '100%';
          setTimeout(() => {
            uploadProgress.classList.remove('active');
            uploadProgressBar.style.width = '0%';
            uploadText.textContent = '';
          }, 600);

          documentLoaded = true;
          statusDot.classList.add('loaded');
          statusLabel.textContent = file.name;
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();

          // Clear previous chat
          chatArea.innerHTML = '';
          welcome.style.display = 'flex';
          chatArea.appendChild(welcome);
          history = [];

          const methodLabel = METHOD_LABELS[job.method] || job.method;
          addSystemMsg(
            `📄 **${file.name}** loaded — ${job.chunks_count} chunks indexed ${methodLabel ? '(' + methodLabel + ')' : ''}. Ready for questions!`
          );
        }
      } catch (e) {
        // Network hiccup — keep polling
      }
    }, 600);
  }

  function resetUploadUI() {
    uploadProgress.classList.remove('active');
    uploadProgressBar.style.width = '0%';
    uploadArea.classList.remove('has-file');
    fileName.textContent = '';
    uploadText.textContent = 'Drop a PDF here or click to upload';
  }

  // ─── Send Question ───
  async function sendQuestion() {
    const question = input.value.trim();
    if (!question || isProcessing || !documentLoaded) return;

    input.value = '';
    input.style.height = 'auto';
    welcome.style.display = 'none';

    // Add user message
    addUserMsg(question);
    history.push({ role: 'user', content: question });

    // Show thinking
    const thinkingEl = addThinking();

    isProcessing = true;
    input.disabled = true;
    sendBtn.disabled = true;

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history: history.slice(0, -1) })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Request failed');
      }

      const data = await res.json();

      // Remove thinking
      thinkingEl.remove();

      // Add assistant message
      addAssistantMsg(data.answer, detectTool(question, data.answer));
      history.push({ role: 'assistant', content: data.answer });

      // Keep history manageable
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      thinkingEl.remove();
      showToast(err.message || 'Something went wrong');
    } finally {
      isProcessing = false;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ─── Detect which tool was likely used ───
  function detectTool(question, answer) {
    const q = question.toLowerCase();
    const a = answer.toLowerCase();
    if (/\d/.test(q) && /[\+\-\*\/\%]/.test(q) || /\b(percent|calculate|how many|total|sum|difference|average)\b/.test(q)) return 'calculator';
    if (/\b(search|document|pdf|page|chunk|according to|the document says|the paper|resume|skills|experience|education)\b/.test(a)) return 'search';
    return 'knowledge';
  }

  // ─── Render Helpers ───
  function addUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-avatar">🙋</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
    chatArea.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addAssistantMsg(text, tool) {
    const div = document.createElement('div');
    div.className = 'msg assistant';

    let toolBadge = '';
    const toolLabels = { calculator: '🧮 Calculator', search: '🔍 Document Search', knowledge: '🧠 Knowledge' };
    if (tool && toolLabels[tool]) toolBadge = `<div class="tool-badge ${tool}">${toolLabels[tool]}</div>`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = toolBadge + renderMarkdown(text);

    div.innerHTML = '<div class="msg-avatar">🤖</div>';
    div.appendChild(bubble);
    chatArea.appendChild(div);
    typesetMath(bubble);
    scrollToBottom();
    return div;
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg assistant';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = renderMarkdown(text);

    div.innerHTML = '<div class="msg-avatar">ℹ️</div>';
    div.appendChild(bubble);
    chatArea.appendChild(div);
    typesetMath(bubble);
    scrollToBottom();
    return div;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'thinking';
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="thinking-dots"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(div);
    scrollToBottom();
    return div;
  }

  // ─── Utilities ───
  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  /**
   * renderMarkdown — converts markdown + LaTeX to HTML.
   *
   * The key trick: extract all math spans FIRST (before any escaping),
   * replace them with placeholders, do markdown → HTML on the rest,
   * then put the math back verbatim so MathJax can find it.
   */
  function renderMarkdown(text) {
    const mathSlots = [];

    // Helper: stash a math string and return a placeholder
    function stash(raw) {
      mathSlots.push(raw);
      return `\x00MATH${mathSlots.length - 1}\x00`;
    }

    // 1. Pull out display math  $$...$$  and  \[...\]
    text = text.replace(/\$\$([\s\S]+?)\$\$/g,  (_, m) => stash(`\\[${m}\\]`));
    text = text.replace(/\\\[([\s\S]+?)\\\]/g,  (_, m) => stash(`\\[${m}\\]`));

    // 2. Pull out inline math  $...$  and  \(...\)
    //    The $ regex avoids matching $$ (already consumed above)
    text = text.replace(/(?<!\$)\$(?!\$)((?:[^$\\]|\\[\s\S])+?)\$(?!\$)/g,
                        (_, m) => stash(`\\(${m}\\)`));
    text = text.replace(/\\\(([\s\S]+?)\\\)/g,  (_, m) => stash(`\\(${m}\\)`));

    // 3. Now escape HTML on the non-math parts
    let html = escapeHtml(text);

    // 4. Apply markdown on the escaped text
    // Code blocks (must come before inline code)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');

    // 5. Restore math placeholders verbatim (MathJax will handle them)
    html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => mathSlots[+i]);

    return html;
  }

  /** Re-run MathJax on a specific DOM element after content is inserted. */
  function typesetMath(el) {
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([el]).catch(console.warn);
    }
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function suggest(q) {
    if (!documentLoaded) { showToast('Upload a PDF first!'); return; }
    input.value = q;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendQuestion();
  }
</script>
